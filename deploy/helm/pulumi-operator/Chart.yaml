apiVersion: v2
name: pulumi-kubernetes-operator
description: A Helm chart for the Pulumi Kubernetes Operator
home: https://pulumi.com
sources:
  - https://github.com/pulumi/pulumi-kubernetes-operator

icon: https://www.pulumi.com/logos/brand/avatar-on-white.svg

type: application

version: "2.5.0"
appVersion: "v2.5.0"

keywords:
  - pulumi
  - kubernetes
  - operator

maintainers:
  - name: blampe
    email: bryce@pulumi.com
  - name: dirien
    email: engin@pulumi.com
  - name: EronWright
    email: eron@pulumi.com

annotations:
  artifacthub.io/prerelease: "false"
